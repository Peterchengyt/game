<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>小火人闯关</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
body { background: #0a0a1a; background-image: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
#wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 800px; padding: 10px; }
canvas { display: block; width: 100%; max-width: 800px; aspect-ratio: 800 / 560; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px rgba(255,140,0,0.3); background: #111; }
#hud { display: flex; gap: 10px; padding: 12px 24px; background: rgba(15, 15, 30, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; color: #fff; font-size: 15px; width: 100%; max-width: 800px; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
#hud b { color: #ffd54f; text-shadow: 0 0 8px rgba(255,213,79,0.4); }
#hud .red { color: #ff5252; text-shadow: 0 0 8px rgba(255,82,82,0.4); }
#hud .green { color: #69f0ae; text-shadow: 0 0 8px rgba(105,240,174,0.4); }
#ctrl { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
#game-container { position: relative; width: 100%; max-width: 800px; display: flex; justify-content: center; }
#menu, #win { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,15,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; border-radius: 12px; opacity: 1; transition: opacity 0.3s ease, visibility 0.3s ease; }
#menu.hidden, #win.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#menu h1 { font-size: clamp(36px, 6vw, 54px); letter-spacing: 4px; background: linear-gradient(135deg, #ff9a44, #fc6076); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(255,140,0,0.5)); margin-bottom: 5px; }
#menu p { color: rgba(255,255,255,0.6); font-size: 12px; letter-spacing: 6px; text-transform: uppercase; }
.btn { background: linear-gradient(135deg, #ff7e5f, #feb47b); color: #fff; border: none; padding: 14px 48px; font-size: 16px; font-weight: 800; letter-spacing: 2px; cursor: pointer; border-radius: 30px; box-shadow: 0 6px 20px rgba(255,126,95,0.4); transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); text-transform: uppercase; }
.btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(255,126,95,0.6); }
.btn:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(255,126,95,0.4); }
.lvl-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 500px; margin: 15px 0; }
.lvl-btn { width: 56px; height: 56px; border: 2px solid rgba(255,213,79,0.3); background: rgba(255,255,255,0.05); color: #ffd54f; font-size: 22px; font-weight: 800; cursor: pointer; border-radius: 14px; transition: all 0.2s ease; backdrop-filter: blur(4px); }
.lvl-btn:hover, .lvl-btn.active { border-color: #ffca28; background: rgba(255,202,40,0.2); box-shadow: 0 0 20px rgba(255,202,40,0.4); transform: translateY(-3px); }
.lvl-btn.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(100%); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
.lvl-btn.locked:hover { transform: none; box-shadow: none; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
#win h2 { color: #ffd54f; font-size: clamp(32px, 5vw, 42px); letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,213,79,0.5); margin-bottom: 10px; }
#win p { color: rgba(255,255,255,0.8); font-size: 16px; padding: 15px 25px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
#mobile-ctrl { display: none; position: absolute; bottom: 20px; left: 0; width: 100%; padding: 0 20px; justify-content: space-between; pointer-events: none; z-index: 50; }
.ctrl-group { display: flex; gap: 15px; pointer-events: auto; }
.m-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.8); font-size: 28px; font-weight: bold; user-select: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); -webkit-tap-highlight-color: transparent; transition: background 0.1s, transform 0.1s; }
.m-btn:active, .m-btn.active { background: rgba(255,213,79,0.3); border-color: rgba(255,213,79,0.6); color: #ffd54f; transform: scale(0.92); }
@media (max-width: 850px) { 
  #ctrl { display: none; }
  #mobile-ctrl { display: flex; }
  #hud { font-size: 13px; padding: 10px 15px; gap: 5px; }
  .lvl-btn { width: 48px; height: 48px; font-size: 18px; }
  #wrap { padding: 5px; }
  #game-container { max-width: 100vw; }
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>关卡 <b id="hLv">1</b>/12</span>
    <span>🔑 <b id="hKey">0</b>/<b id="hKeyN">0</b></span>
    <span>⭐ <b id="hCoin">0</b></span>
    <span>💀 <b class="red" id="hLife">3</b></span>
    <span>⚠ <b class="red" id="hObs">0</b>/<b id="hObsTotal">20</b></span>
    <span>⏱ <b id="hTime">00:00</b></span>
  </div>
  <div id="game-container">
    <canvas id="c" width="800" height="560"></canvas>
    <div id="mobile-ctrl">
      <div class="ctrl-group">
        <div class="m-btn" id="m-left">←</div>
        <div class="m-btn" id="m-right">→</div>
      </div>
      <div class="ctrl-group">
        <div class="m-btn" id="m-jump">↑</div>
      </div>
    </div>
    <div id="menu">
      <h1>小火人闯关</h1>
      <p>LITTLE FIREMAN ADVENTURE</p>
      <p style="margin-top:6px;color:rgba(255,255,255,0.4);font-size:11px;">☠ 地狱难度 ☠ 动态障碍物 + 极限速度</p>
      <div class="lvl-grid" id="lvls"></div>
      <button class="btn" id="startBtn">开始挑战</button>
      <p style="margin-top:10px;font-size:11px;color:rgba(255,255,255,0.3)">← → 移动 | 空格/W/↑ 二连跳 | R 重置</p>
    </div>
    <div id="win" class="hidden">
      <h2 id="wTitle">过关!</h2>
      <p id="wInfo"></p>
      <button class="btn" id="nextBtn">下一关</button>
    </div>
  </div>
  <div id="ctrl">← → 移动 | 空格/W/↑ 二连跳 | R 重置关卡</div>
</div>

<script>

var C = document.getElementById('c');
var X = C.getContext('2d');
var W = 800, H = 560, T = 40, COLS = 20, ROWS = 14;

// 12关地狱难度
var LVS = [
  {name:'地狱入口',keys:0,en:[{x:8,y:13,mn:4,mx:16,sp:20}]},
  {name:'死亡通道',keys:1,en:[{x:6,y:13,mn:3,mx:13,sp:24}]},
  {name:'闪电地狱',keys:0,en:[{x:5,y:13,mn:3,mx:10,sp:28},{x:14,y:13,mn:11,mx:18,sp:30}]},
  {name:'敌人围攻',keys:0,en:[{x:4,y:13,mn:2,mx:8,sp:34},{x:10,y:13,mn:8,mx:14,sp:36},{x:16,y:13,mn:14,mx:19,sp:38}]},
  {name:'岩浆炼狱',keys:0,en:[{x:6,y:13,mn:4,mx:12,sp:42},{x:15,y:13,mn:12,mx:19,sp:44}]},
  {name:'钥匙迷宫',keys:1,en:[{x:5,y:13,mn:3,mx:10,sp:48},{x:14,y:13,mn:10,mx:18,sp:50}]},
  {name:'高空危机',keys:0,en:[{x:4,y:13,mn:2,mx:9,sp:52},{x:11,y:13,mn:9,mx:16,sp:54},{x:8,y:9,mn:6,mx:12,sp:46}]},
  {name:'敌军基地',keys:0,en:[{x:3,y:13,mn:2,mx:7,sp:56},{x:9,y:13,mn:7,mx:13,sp:58},{x:15,y:13,mn:13,mx:19,sp:60},{x:7,y:9,mn:5,mx:11,sp:50}]},
  {name:'双钥试炼',keys:2,en:[{x:5,y:13,mn:3,mx:10,sp:62},{x:12,y:13,mn:10,mx:17,sp:64}]},
  {name:'极限跳跃',keys:0,en:[{x:4,y:13,mn:2,mx:8,sp:66},{x:10,y:13,mn:8,mx:14,sp:68},{x:16,y:13,mn:14,mx:19,sp:70}]},
  {name:'断崖高塔',keys:1,en:[{x:4,y:13,mn:2,mx:9,sp:72},{x:13,y:13,mn:10,mx:18,sp:74},{x:8,y:9,mn:6,mx:12,sp:60}],gap:true},
  {name:'最终试炼',keys:2,en:[{x:3,y:13,mn:2,mx:6,sp:76},{x:8,y:13,mn:6,mx:11,sp:78},{x:13,y:13,mn:11,mx:16,sp:80},{x:17,y:13,mn:15,mx:19,sp:82},{x:7,y:9,mn:5,mx:12,sp:70}]}
];

// 障碍物数量：第N关 = 20 + (N-1) * 10
function getObsCount(idx) {
  return 20 + idx * 10;
}

// 障碍物弹出间隔：第1关1.5秒，每关递减0.15秒，最低0.3秒
function getObsInterval(idx) {
  var interval = 1500 - idx * 150;
  return Math.max(300, interval);
}

// 生成地图
function genMap(lv, idx) {
  var m = [];
  for (var r = 0; r < ROWS; r++) {
    var row = [];
    for (var c = 0; c < COLS; c++) {
      row.push(0);
    }
    m.push(row);
  }
  
  for (var c = 0; c < COLS; c++) {
    m[ROWS-1][c] = 1;
    m[ROWS-2][c] = 1;
  }
  
  for (var c = 0; c < COLS; c++) {
    m[ROWS-1][c] = 3;
  }
  
  var platforms = [];
  if (idx < 3) {
    platforms = [[3,11],[7,11],[12,11],[16,11],[5,9],[10,9],[15,9],[8,7],[13,7],[10,5],[16,5],[18,2]];
  } else if (idx < 6) {
    platforms = [[2,11],[6,11],[10,11],[15,11],[4,9],[9,9],[14,9],[7,7],[12,7],[10,5],[16,5],[18,2]];
  } else if (idx < 9) {
    platforms = [[3,11],[8,11],[13,11],[17,11],[5,9],[10,9],[15,9],[8,7],[13,7],[11,5],[16,5],[18,2]];
  } else {
    platforms = [[2,11],[7,11],[12,11],[17,11],[4,9],[9,9],[14,9],[6,7],[11,7],[10,5],[15,5],[18,2]];
  }
  
  for (var i = 0; i < platforms.length; i++) {
    var pr = platforms[i][1];
    var pc = platforms[i][0];
    if (pr >= 0 && pr < ROWS && pc >= 0 && pc < COLS) {
      m[pr][pc] = 2;
      if (pc + 1 < COLS) m[pr][pc+1] = 2;
    }
  }
  
  var coins = [[1,11],[4,9],[9,9],[14,9],[8,7],[13,7],[11,5],[16,5]];
  for (var i = 0; i < Math.min(coins.length, 5 + idx); i++) {
    var cr = coins[i] ? coins[i][1] : 11;
    var cc = coins[i] ? coins[i][0] : (2 + i * 3);
    if (cr >= 0 && cr < ROWS && cc >= 0 && cc < COLS && m[cr][cc] === 0) {
      m[cr][cc] = 5;
    }
  }
  
  if (lv.keys > 0) {
    var kpos = idx < 6 ? [4, 10] : [6, 10];
    if (m[kpos[1]][kpos[0]] === 0) m[kpos[1]][kpos[0]] = 4;
    if (lv.keys > 1) {
      var kpos2 = idx < 9 ? [14, 10] : [12, 10];
      if (m[kpos2[1]][kpos2[0]] === 0) m[kpos2[1]][kpos2[0]] = 4;
    }
  }
  
  if (lv.keys > 0) {
    for (var c = 1; c < COLS - 1; c++) {
      if (m[ROWS-3][c] === 1 || m[ROWS-3][c] === 2) {
        m[ROWS-3][c] = 7;
        m[ROWS-4][c] = 7;
        break;
      }
    }
  }
  
  if (lv.gap) {
    for (var r = 3; r < 9; r++) {
      if (r !== 6) m[r][10] = 8;
    }
  } else if (idx >= 9) {
    for (var r = 3; r < 11; r++) {
      m[r][18] = 8;
    }
  }
  
  m[1][19] = 11;
  
  if (idx === 4 || idx === 11) {
    m[ROWS-3][3] = 3;
    m[ROWS-3][4] = 3;
    m[ROWS-3][14] = 3;
    m[ROWS-3][15] = 3;
  }
  
  return m;
}

for (var i = 0; i < LVS.length; i++) {
  LVS[i].map = genMap(LVS[i], i);
  LVS[i].obs = getObsCount(i);
  LVS[i].oi = getObsInterval(i);
}

var st = 'menu', curLv = 0, lives = 3, keyGot = 0, coinGot = 0, stTime = 0, winTime = 0, frm = 0, pts = [];
var unlk = parseInt(localStorage.getItem('flv') || '1');
var jp = false;

var pl = {x:0,y:0,w:28,h:34,vx:0,vy:0,gr:false,fc:1,fm:0,ft:0,al:true,iv:0,wn:false,jc:0};
var ens = [], its = [], dr = null, fg = null, obs = [], oCnt = 0;

var ks = {};
document.onkeydown = function(e) {
  ks[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyR' && st === 'play') resetLv();
};
document.onkeyup = function(e) { ks[e.code] = false; };

// 移动端输入
function bindTouch(id, code) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', function(e) { e.preventDefault(); ks[code] = true; el.classList.add('active'); }, {passive: false});
  el.addEventListener('touchend', function(e) { e.preventDefault(); ks[code] = false; el.classList.remove('active'); }, {passive: false});
  el.addEventListener('touchcancel', function(e) { e.preventDefault(); ks[code] = false; el.classList.remove('active'); }, {passive: false});
}
bindTouch('m-left', 'ArrowLeft');
bindTouch('m-right', 'ArrowRight');
bindTouch('m-jump', 'Space');


function getT(x, y) {
  var tx = Math.floor(x / T), ty = Math.floor(y / T);
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return 0;
  return LVS[curLv].map[ty][tx];
}

function isSl(tx, ty) { var t = getT(tx * T + 1, ty * T + 1); return t === 1 || t === 7; }
function isPl(tx, ty) { return getT(tx * T + 1, ty * T + 1) === 2; }
function isDn(tx, ty) { return getT(tx * T + 1, ty * T + 1) === 3; }
function isLd(tx, ty) { return getT(tx * T + T/2, ty * T + T/2) === 8; }

function loadLv(idx) {
  curLv = idx;
  var lv = LVS[idx];
  var mp = lv.map;
  
  pl.x = 1.5 * T;
  pl.y = 11 * T;
  pl.vx = 0; pl.vy = 0;
  pl.al = true; pl.iv = 90; pl.wn = false;
  pl.gr = false; pl.fc = 1;
  pl.fm = 0; pl.ft = 0;
  pl.jc = 0;
  
  its = [];
  ens = [];
  obs = [];
  dr = null;
  fg = null;
  oCnt = 0;
  keyGot = 0;
  coinGot = 0;
  stTime = Date.now();
  winTime = 0;
  
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var t = mp[r][c];
      if (t === 4) its.push({t:'key', x:c*T, y:r*T, g:false});
      if (t === 5) its.push({t:'coin', x:c*T, y:r*T, g:false});
      if (t === 7) dr = {x:c*T, y:r*T};
      if (t === 11) fg = {x:c*T, y:r*T};
    }
  }
  
  if (lv.en) {
    for (var i = 0; i < lv.en.length; i++) {
      var e = lv.en[i];
      ens.push({
        x: e.x * T, y: e.y * T,
        mn: e.mn * T, mx: (e.mx + 1) * T,
        spd: e.sp, al: true, dr: 1, f: 0
      });
    }
  }
  
  document.getElementById('hLv').textContent = idx + 1;
  document.getElementById('hKeyN').textContent = lv.keys;
  document.getElementById('hObsTotal').textContent = lv.obs;
  document.getElementById('hObs').textContent = '0';
  st = 'play';
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('win').classList.add('hidden');
}

function resetLv() {
  if (lives <= 0) {
    lives = 3; st = 'menu';
    mkBtns();
    document.getElementById('menu').classList.remove('hidden');
    return;
  }
  loadLv(curLv);
}

function spawnObs() {
  var lv = LVS[curLv];
  if (oCnt >= lv.obs) return;
  
  // 每次尝试生成多个障碍物（随机1-3个）
  var count = 1 + Math.floor(Math.random() * 3);
  
  for (var j = 0; j < count && oCnt < lv.obs; j++) {
    var tx = 2 + Math.floor(Math.random() * 16);
    var ty = 3 + Math.floor(Math.random() * 9);
    
    // 检查位置是否为空，且不与玩家位置太近
    var playerDist = Math.abs(tx - Math.floor(pl.x/T)) + Math.abs(ty - Math.floor(pl.y/T));
    if (getT(tx * T + T/2, ty * T + T/2) === 0 && playerDist > 3) {
      // 检查是否已有障碍物在附近
      var hasNearby = false;
      for (var i = 0; i < obs.length; i++) {
        if (Math.abs(obs[i].x/T - tx) < 2 && Math.abs(obs[i].y/T - ty) < 2) {
          hasNearby = true;
          break;
        }
      }
      
      if (!hasNearby) {
        obs.push({
          x: tx * T,
          y: ty * T,
          tp: lv.gap ? 'spike' : (Math.random() > 0.5 ? 'spike' : 'block'),
          lf: 4000,
          al: true
        });
        oCnt++;
      }
    }
  }
  
  document.getElementById('hObs').textContent = oCnt;
}

var GV = 0.6, JM = -13, SP = 5;

function updPl() {
  if (!pl.al) return;
  if (pl.iv > 0) pl.iv--;
  if (pl.wn) return;
  
  var L = ks['ArrowLeft'] || ks['KeyA'];
  var R = ks['ArrowRight'] || ks['KeyD'];
  var JP = ks['Space'] || ks['ArrowUp'] || ks['KeyW'];
  
  var onLd = isLd(Math.floor(pl.x/T), Math.floor((pl.y + pl.h/2)/T)) ||
            isLd(Math.floor((pl.x + pl.w)/T), Math.floor((pl.y + pl.h/2)/T));
  
  if (L) { pl.vx = -SP; pl.fc = -1; }
  else if (R) { pl.vx = SP; pl.fc = 1; }
  else pl.vx *= 0.65;
  
  if (onLd) {
    if (JP) pl.vy = -5;
    else if (ks['ArrowDown'] || ks['KeyS']) pl.vy = 5;
    else pl.vy *= 0.75;
  }
  
  if (JP && !jp && pl.jc < 2 && !onLd) {
    pl.vy = JM;
    pl.gr = false;
    pl.jc++;
    var cl = pl.jc === 1 ? '#fc0' : '#f30';
    spk(pl.x + pl.w/2, pl.y + pl.h, cl, 10);
    jp = true;
  }
  if (!JP) jp = false;
  
  if (!onLd) {
    pl.vy += GV;
    if (pl.vy > 18) pl.vy = 18;
  }
  
  pl.x += pl.vx;
  
  var tL = Math.floor(pl.x / T);
  var tR = Math.floor((pl.x + pl.w) / T);
  var tM = Math.floor((pl.y + pl.h/2) / T);
  
  if (pl.vx > 0 && (isSl(tR, tM) || (getT(tR*T+1, pl.y+pl.h/2) === 7 && keyGot < LVS[curLv].keys))) { pl.x = tR * T - pl.w; pl.vx = 0; }
  if (pl.vx < 0 && (isSl(tL, tM) || (getT(tL*T+1, pl.y+pl.h/2) === 7 && keyGot < LVS[curLv].keys))) { pl.x = (tL + 1) * T; pl.vx = 0; }
  
  if (pl.x < 0) pl.x = 0;
  if (pl.x + pl.w > W) pl.x = W - pl.w;
  
  pl.y += pl.vy;
  pl.gr = false;
  
  var tB = Math.floor((pl.y + pl.h) / T);
  var tT = Math.floor(pl.y / T);
  var tL2 = Math.floor((pl.x + 6) / T);
  var tR2 = Math.floor((pl.x + pl.w - 6) / T);
  
  if (pl.vy >= 0) {
    if (isSl(tL2, tB) || isSl(tR2, tB)) { pl.y = tB * T - pl.h; pl.vy = 0; pl.gr = true; pl.jc = 0; }
    else if (isPl(tL2, tB) || isPl(tR2, tB)) { pl.y = tB * T - pl.h; pl.vy = 0; pl.gr = true; pl.jc = 0; }
  } else {
    if (isSl(tL2, tT) || isSl(tR2, tT)) { pl.y = (tT + 1) * T; pl.vy = 0; }
  }
  
  if (pl.y > H + 60) { die(); return; }
  
  var tBL = Math.floor((pl.x + 7) / T);
  var tBR = Math.floor((pl.x + pl.w - 7) / T);
  var tBB = Math.floor((pl.y + pl.h - 3) / T);
  if (isDn(tBL, tBB) || isDn(tBR, tBB)) { die(); return; }
  
  for (var i = 0; i < obs.length; i++) {
    var o = obs[i];
    if (!o.al) continue;
    if (pl.x + pl.w > o.x && pl.x < o.x + T && pl.y + pl.h > o.y && pl.y < o.y + T) {
      die(); return;
    }
  }
  
  if (Math.abs(pl.vx) > 0.5 && pl.gr) { pl.ft++; if (pl.ft > 4) { pl.ft = 0; pl.fm = (pl.fm + 1) % 4; } }
  else { pl.fm = 0; pl.ft = 0; }
  
  for (var i = 0; i < ens.length; i++) {
    var e = ens[i];
    if (!e.al) continue;
    if (pl.x + pl.w > e.x && pl.x < e.x + T && pl.y + pl.h > e.y && pl.y < e.y + T) {
      if (pl.vy > 0 && pl.y + pl.h - 12 < e.y + T/2) { e.al = false; pl.vy = JM * 0.55; pl.jc = 0; spk(e.x + T/2, e.y + T/2, '#fc0', 15); }
      else { die(); return; }
    }
  }
  
  for (var j = 0; j < its.length; j++) {
    var it = its[j];
    if (it.g) continue;
    var ix = it.x + T/2, iy = it.y + T/2;
    var px = pl.x + pl.w/2, py = pl.y + pl.h/2;
    if (Math.abs(px - ix) < 26 && Math.abs(py - iy) < 26) {
      it.g = true;
      spk(ix, iy, it.t === 'key' ? '#f90' : '#fc0', 12);
      if (it.t === 'key') keyGot++;
      else coinGot++;
    }
  }
  
  if (fg) {
    var fx = fg.x + T/2, fy = fg.y + T/2;
    if (Math.abs(pl.x + pl.w/2 - fx) < 32 && Math.abs(pl.y + pl.h/2 - fy) < 32) {
      if (keyGot >= LVS[curLv].keys) winLv();
      else {
        spk(pl.x + pl.w/2, pl.y + pl.h/2, '#f30', 12);
        var nd = LVS[curLv].keys - keyGot;
        var mg = document.createElement('div');
        mg.style.cssText = 'position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#f30;font-size:20px;font-weight:bold;text-shadow:0 0 20px #f00;pointer-events:none;z-index:100;';
        mg.textContent = '需要 ' + nd + ' 把钥匙！';
        document.body.appendChild(mg);
        setTimeout(function(){ mg.remove(); }, 900);
      }
    }
  }
}

function die() {
  if (pl.iv > 0) return;
  pl.al = false;
  lives--;
  spk(pl.x + pl.w/2, pl.y + pl.h/2, '#f00', 30);
  setTimeout(resetLv, 700);
}

function winLv() {
  if (pl.wn) return;
  pl.wn = true;
  winTime = Date.now();
  spk(pl.x + pl.w/2, pl.y + pl.h/2, '#fc0', 45);
  
  if (curLv + 1 < LVS.length && unlk <= curLv + 1) {
    unlk = curLv + 2;
    localStorage.setItem('flv', String(unlk));
  }
  
  var t = Math.floor((Date.now() - stTime) / 1000);
  var last = curLv >= LVS.length - 1;
  
  document.getElementById('wTitle').textContent = last ? '通关!' : '过关!';
  document.getElementById('wInfo').innerHTML = 
    '金币:' + coinGot + ' | 钥匙:' + keyGot + ' | 障碍物:' + oCnt + '/' + LVS[curLv].obs + ' | 时间:' + t + '秒';
  document.getElementById('nextBtn').textContent = last ? '重新开始' : '下一关';
  document.getElementById('win').classList.remove('hidden');
  st = 'win';
}

function updEns() {
  for (var i = 0; i < ens.length; i++) {
    var e = ens[i];
    if (!e.al) continue;
    e.x += e.spd * e.dr * 0.016;
    e.f++;
    if (e.x <= e.mn) { e.x = e.mn; e.dr = 1; }
    if (e.x + T >= e.mx) { e.x = e.mx - T; e.dr = -1; }
  }
}

function spk(x, y, cl, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var s = 2 + Math.random() * 7;
    pts.push({x:x, y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3, lf:1, sz:2+Math.random()*7, cl:cl});
  }
}

function updPts() {
  for (var i = pts.length - 1; i >= 0; i--) {
    var p = pts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.lf -= 0.035;
    if (p.lf <= 0) pts.splice(i, 1);
  }
}

function drw() {
  X.fillStyle = '#050508';
  X.fillRect(0, 0, W, H);
  
  for (var i = 0; i < 50; i++) {
    var sx = (i * 151 + 40) % W;
    var sy = (i * 113 + 25) % (H * 0.4);
    var tw = 0.5 + 0.5 * Math.sin(frm * 0.05 + i * 1.6);
    X.fillStyle = 'rgba(255,255,255,' + (tw * 0.7) + ')';
    X.beginPath();
    X.arc(sx, sy, 0.6 + (i % 4) * 0.5, 0, Math.PI * 2);
    X.fill();
  }
  
  var mp = LVS[curLv].map;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var t = mp[r][c];
      var px = c * T, py = r * T;
      if (t === 1) {
        X.fillStyle = '#2a4810';
        X.fillRect(px, py, T, T);
        X.fillStyle = '#3a5818';
        X.fillRect(px, py, T, 5);
      } else if (t === 2) {
        X.fillStyle = '#3a2818';
        X.fillRect(px, py + 5, T, T - 5);
        X.fillStyle = '#4a3828';
        X.fillRect(px, py + 5, T, 4);
      } else if (t === 3) {
        var wv = Math.sin(frm * 0.09 + px * 0.07) * 4;
        X.fillStyle = 'hsl(' + (6 + wv*2) + ',95%,' + (38 + wv) + '%)';
        X.fillRect(px, py, T, T);
        X.fillStyle = 'rgba(255,120,40,0.6)';
        X.fillRect(px, py, T, 5);
      } else if (t === 8) {
        X.fillStyle = '#2a1808';
        X.fillRect(px + 8, py, 5, T);
        X.fillRect(px + T - 13, py, 5, T);
        X.fillStyle = '#1a0800';
        for (var rr = 8; rr < T; rr += 10) X.fillRect(px + 8, py + rr, T - 16, 5);
      } else if (t === 7) {
        if (keyGot >= LVS[curLv].keys) {
          X.fillStyle = 'rgba(30,90,30,0.8)';
          X.fillRect(px, py, T, T);
        } else {
          X.fillStyle = '#301810';
          X.fillRect(px + 3, py, T - 6, T);
          X.fillStyle = '#402818';
          X.fillRect(px + 7, py + 4, T - 18, T/2 - 4);
          X.fillRect(px + 7, py + T/2 + 4, T - 18, T/2 - 6);
          X.fillStyle = '#fc0';
          X.beginPath();
          X.arc(px + T - 11, py + T/2, 4, 0, Math.PI * 2);
          X.fill();
        }
      } else if (t === 11) {
        X.fillStyle = '#555';
        X.fillRect(px + T/2 - 3, py - 22, 6, T + 22);
        var wv = Math.sin(frm * 0.1) * 4;
        var cw = keyGot >= LVS[curLv].keys;
        X.fillStyle = cw ? '#2a0' : '#a00';
        X.beginPath();
        X.moveTo(px + T/2 + 3, py - 20);
        X.lineTo(px + T - 6 + wv, py - 10);
        X.lineTo(px + T/2 + 3, py);
        X.closePath();
        X.fill();
        X.fillStyle = cw ? '#fc0' : '#fff';
        X.font = '12px Arial';
        X.textAlign = 'center';
        X.fillText(cw ? '★' : '⚠', px + T - 10 + wv * 0.5, py - 4);
        X.textAlign = 'left';
      }
    }
  }
  
  for (var i = 0; i < obs.length; i++) {
    var o = obs[i];
    if (!o.al) continue;
    if (o.tp === 'spike') {
      X.fillStyle = '#f00';
      X.beginPath();
      X.moveTo(o.x + T/2, o.y);
      X.lineTo(o.x + T, o.y + T);
      X.lineTo(o.x, o.y + T);
      X.closePath();
      X.fill();
    } else {
      X.fillStyle = '#333';
      X.fillRect(o.x, o.y, T, T);
      X.fillStyle = '#555';
      X.fillRect(o.x + 4, o.y + 4, T - 8, T - 8);
    }
  }
  
  for (var k = 0; k < its.length; k++) {
    var it = its[k];
    if (it.g) continue;
    var bb = Math.sin(frm * 0.15 + it.x) * 4;
    if (it.t === 'coin') {
      X.fillStyle = '#fc0';
      X.shadowColor = '#fc0';
      X.shadowBlur = 12;
      X.beginPath();
      X.arc(it.x + T/2, it.y + T/2 + bb, 11, 0, Math.PI * 2);
      X.fill();
      X.fillStyle = '#ffe';
      X.beginPath();
      X.arc(it.x + T/2, it.y + T/2 + bb, 6, 0, Math.PI * 2);
      X.fill();
      X.shadowBlur = 0;
    } else {
      X.fillStyle = '#f90';
      X.shadowColor = '#f90';
      X.shadowBlur = 15;
      X.beginPath();
      X.arc(it.x + T/2 - 5, it.y + T/2 - 3 + bb, 7, 0, Math.PI * 2);
      X.fill();
      X.fillStyle = '#050508';
      X.beginPath();
      X.arc(it.x + T/2 - 5, it.y + T/2 - 3 + bb, 3, 0, Math.PI * 2);
      X.fill();
      X.fillStyle = '#f90';
      X.fillRect(it.x + T/2 - 1, it.y + T/2 - 1 + bb, 15, 4);
      X.fillRect(it.x + T/2 + 9, it.y + T/2 + 3 + bb, 4, 7);
      X.fillRect(it.x + T/2 + 5, it.y + T/2 + 3 + bb, 4, 5);
      X.shadowBlur = 0;
    }
  }
  
  for (var e = 0; e < ens.length; e++) {
    var en = ens[e];
    if (!en.al) continue;
    var bnc = Math.abs(Math.sin(en.f * 0.18)) * 4;
    X.save();
    X.translate(en.x + T/2, en.y + T/2);
    if (en.dr < 0) X.scale(-1, 1);
    X.translate(-T/2, -T/2);
    X.fillStyle = '#400020';
    X.beginPath();
    X.roundRect(4, 6, T - 8, T - 6, 5);
    X.fill();
    X.fillStyle = '#600030';
    for (var s = 0; s < 4; s++) {
      X.beginPath();
      X.moveTo(6 + s * 10, 6);
      X.lineTo(11 + s * 10, -5);
      X.lineTo(16 + s * 10, 6);
      X.fill();
    }
    X.fillStyle = '#fff';
    X.beginPath(); X.arc(T/2 - 5, T/2, 5, 0, Math.PI * 2); X.fill();
    X.beginPath(); X.arc(T/2 + 5, T/2, 5, 0, Math.PI * 2); X.fill();
    X.fillStyle = '#700';
    X.beginPath(); X.arc(T/2 - 4 + en.dr * 2, T/2, 2.5, 0, Math.PI * 2); X.fill();
    X.beginPath(); X.arc(T/2 + 6 + en.dr * 2, T/2, 2.5, 0, Math.PI * 2); X.fill();
    X.restore();
  }
  
  if (pl.al || (pl.iv > 0 && frm % 5 < 3)) {
    X.save();
    X.translate(pl.x + pl.w/2, pl.y + pl.h/2);
    if (pl.fc < 0) X.scale(-1, 1);
    X.translate(-pl.w/2, -pl.h/2);
    X.fillStyle = 'rgba(0,0,0,0.18)';
    X.beginPath();
    X.arc(pl.w/2, pl.h + 2, pl.w/2 * 0.75, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = '#0d47a1';
    X.fillRect(5, pl.h - 14, 9, 14 + (pl.fm % 2 === 0 ? 4 : -4));
    X.fillRect(pl.w - 14, pl.h - 14, 9, 14 - (pl.fm % 2 === 0 ? 4 : -4));
    X.fillStyle = '#0a3a90';
    X.fillRect(3, pl.h - 6, 11, 6);
    X.fillRect(pl.w - 14, pl.h - 6, 11, 6);
    var bg = X.createLinearGradient(0, 10, 0, pl.h - 22);
    bg.addColorStop(0, '#e65100');
    bg.addColorStop(0.5, '#d84315');
    bg.addColorStop(1, '#bf360c');
    X.fillStyle = bg;
    X.beginPath();
    X.roundRect(3, 10, pl.w - 6, pl.h - 24, 3);
    X.fill();
    X.fillStyle = '#fc0';
    X.fillRect(4, pl.h - 22, pl.w - 8, 3);
    X.fillStyle = '#ffcc80';
    X.beginPath();
    X.arc(pl.w/2, 7, 9, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = '#f44336';
    X.beginPath();
    X.arc(pl.w/2, 5, 10, Math.PI, 0);
    X.fill();
    X.fillStyle = '#c62828';
    X.fillRect(pl.w/2 - 11, 4, 22, 4);
    X.fillStyle = '#fc0';
    X.font = 'bold 6px Arial';
    X.textAlign = 'center';
    X.fillText('FD', pl.w/2, 9);
    X.fillStyle = '#333';
    X.beginPath();
    X.arc(pl.w/2 + 2, 7, 2, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(pl.w/2 + 3, 6, 0.7, 0, Math.PI * 2);
    X.fill();
    X.shadowColor = '#f30';
    X.shadowBlur = 18;
    var fh = 7 + Math.sin(frm * 0.35) * 3;
    X.fillStyle = '#f30';
    X.beginPath();
    X.moveTo(pl.w/2 - 5, 0);
    X.quadraticCurveTo(pl.w/2 - 7, -fh, pl.w/2 - 1, -fh - 5);
    X.quadraticCurveTo(pl.w/2, -fh + 3, pl.w/2 + 1, -fh - 5);
    X.quadraticCurveTo(pl.w/2 + 7, -fh, pl.w/2 + 5, 0);
    X.fill();
    X.fillStyle = '#fc0';
    X.beginPath();
    X.moveTo(pl.w/2 - 2, -1);
    X.quadraticCurveTo(pl.w/2, -fh + 3, pl.w/2 + 2, -1);
    X.fill();
    X.shadowBlur = 0;
    X.restore();
  }
  
  for (var p = 0; p < pts.length; p++) {
    var pt = pts[p];
    X.globalAlpha = pt.lf;
    X.fillStyle = pt.cl;
    X.beginPath();
    X.arc(pt.x, pt.y, pt.sz * pt.lf, 0, Math.PI * 2);
    X.fill();
  }
  X.globalAlpha = 1;
  
  var el = 0;
  if (st === 'play') {
    el = Math.floor((Date.now() - stTime) / 1000);
  } else if (st === 'win') {
    el = Math.floor((winTime - stTime) / 1000);
  }
  document.getElementById('hKey').textContent = keyGot;
  document.getElementById('hKey').style.color = keyGot >= LVS[curLv].keys ? '#69f0ae' : '#ff5252';
  document.getElementById('hCoin').textContent = coinGot;
  document.getElementById('hLife').textContent = lives;
  document.getElementById('hTime').textContent = String(Math.floor(el/60)).padStart(2,'0') + ':' + String(el%60).padStart(2,'0');
}

var lastObs = 0;

function loop() {
  frm++;
  if (st === 'play') {
    updPl();
    updEns();
    
    var lv = LVS[curLv];
    var now = Date.now();
    if (now - lastObs > lv.oi && oCnt < lv.obs) {
      spawnObs();
      lastObs = now;
    }
    
    for (var i = obs.length - 1; i >= 0; i--) {
      obs[i].lf -= 16;
      if (obs[i].lf <= 0) obs.splice(i, 1);
    }
  }
  updPts();
  drw();
  requestAnimationFrame(loop);
}

function mkBtns() {
  var el = document.getElementById('lvls');
  el.innerHTML = '';
  for (var i = 0; i < LVS.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'lvl-btn' + (i < unlk ? '' : ' locked');
    btn.textContent = i + 1;
    btn.onclick = (function(idx) {
      return function() { if (idx < unlk) curLv = idx; mkBtns(); };
    })(i);
    el.appendChild(btn);
  }
}

document.getElementById('startBtn').onclick = function() { loadLv(curLv); };

document.getElementById('nextBtn').onclick = function() {
  if (curLv >= LVS.length - 1) { curLv = 0; lives = 3; }
  else curLv++;
  loadLv(curLv);
};

mkBtns();
loop();
</script>
</body>
